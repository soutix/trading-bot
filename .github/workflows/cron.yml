name: Bot Rebalance Cron

on:
  schedule:
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:

jobs:
  rebalance:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger rebalance
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_APP_URL }}/api/rebalance" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")

          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Rebalance échoué — status $RESPONSE"
            exit 1
          fi

          MODE=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('current_mode','?'), d.get('active_asset',''))")
          echo "✅ État du bot : $MODE"