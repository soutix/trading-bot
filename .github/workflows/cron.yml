name: Bot Rebalance Cron

on:
  schedule:
    # S'exécute toutes les 8 heures: 00:00, 08:00, 16:00 UTC
    - cron: '0 0,8,16 * * *'
  workflow_dispatch: # Permet de déclencher le cron manuellement depuis GitHub

jobs:
  rebalance:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger rebalance
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_APP_URL }}/api/rebalance" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")

          echo "HTTP Status: $RESPONSE"
          echo "Response:"
          cat /tmp/response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Rebalance call failed with status $RESPONSE"
            exit 1
          fi

          MODE=$(cat /tmp/response.json | python3 -c "import sys,json; data=json.load(sys.stdin); print(data.get('current_mode', data.get('message', '?')))")
          echo "✅ Bot state / message : $MODE"