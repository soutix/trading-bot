name: Bot Rebalance Cron

on:
  schedule:
    # S'exécute toutes les 8 heures: 00:00, 08:00, 16:00 UTC
    - cron: '0 0,8,16 * * *'
  workflow_dispatch: # Permet de déclencher manuellement depuis GitHub

jobs:
  rebalance:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger rebalance
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_APP_URL }}/api/rebalance" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")

          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Rebalance échoué — status $RESPONSE"
            exit 1
          fi

          # Lecture du mode ET de l'actif actif (multi-asset V2)
          SUMMARY=$(cat /tmp/response.json | python3 -c "
import sys, json
data = json.load(sys.stdin)
mode   = data.get('current_mode', data.get('message', '?'))
asset  = data.get('active_asset', '')
status = f'{mode} {asset}'.strip() if asset else mode
print(status)
")
          echo "✅ État du bot : $SUMMARY"